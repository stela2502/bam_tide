[package]
name = "bam_tide"
version = "1.2.2"
edition = "2024"
description = "A fast and memory-efficient BAM processing toolkit for coverage calculation and quantification, designed as a scalable alternative to deeptools bamCoverage for large sequencing datasets. And additional BAM tools."
license = "MIT"
repository = "https://github.com/stela2502/bam_tide"
homepage = "https://github.com/stela2502/bam_tide"
documentation = "https://docs.rs/bam_tide"
readme = "README.md"
keywords = ["bioinformatics", "bam", "coverage", "bigwig", "ngs"]
categories = ["science", "command-line-utilities"]
authors = ["Stefan Lang"]
include = [
  "Cargo.toml",
  "Cargo.lock",
  "README.md",
  "LICENSE*",
  "src/**",
  "build.rs",
]


[dependencies]
anyhow = "1.0.100"
bigtools = "0.5.6"
clap = { version = "4.5.56", features = ["derive"] }
rayon = "1.11.0"
rust-htslib = {version = "1.0.0",  features = ["static"]}
tokio = "1.49.0"

scdata = "0.1.0" 
gtf_splice_index = "0.4.0" 
mapping_info =  "0.1.0"
int_to_str = { package="stela-int-to-str", version="0.1.0" }
assert_cmd = "2.1.2"
