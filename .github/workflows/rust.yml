name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      # 1. Check out your code
      - uses: actions/checkout@v4

      # 2. Install required native libraries for rust-htslib
      - name: Install HTSlib dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libhts-dev \
            libbz2-dev \
            liblzma-dev \
            libz-dev \
            pkg-config

      # Replace actions-rs/toolchain with dtolnay/rust-toolchain (actively maintained)
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      # Optional but recommended: cache cargo + target
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --verbose

      - name: Test
        run: cargo test --verbose
